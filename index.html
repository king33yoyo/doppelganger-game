<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>030精灵捕捉大赛</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <transition name="fade" mode="out-in">
            <div v-if="!isLoggedIn" key="login" class="login-wrapper">
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png" class="login-pokemon-deco left" alt="">
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/133.png" class="login-pokemon-deco right" alt="">
                <login-page @login="handleLogin"></login-page>
            </div>
            <div v-else key="main" class="app-wrapper">
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png" class="pokemon-bg pokemon-bg-1" alt="">
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/7.png" class="pokemon-bg pokemon-bg-2" alt="">
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/1.png" class="pokemon-bg pokemon-bg-3" alt="">
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/131.png" class="pokemon-bg pokemon-bg-4" alt="">
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/133.png" class="pokemon-bg pokemon-bg-5" alt="">
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/143.png" class="pokemon-bg pokemon-bg-6" alt="">
                <nav-bar
                    :user="currentUser"
                    :season="currentSeason"
                    @logout="handleLogout"
                    @navigate="navigate"
                ></nav-bar>
                <main class="main-content">
                    <transition name="slide" mode="out-in">
                        <member-wall
                            v-if="currentRoute === '/' || currentRoute === ''"
                            :members="members"
                            :entries="entries"
                            :season="currentSeason"
                            @view-member="viewMember"
                        ></member-wall>
                        <upload-page
                            v-else-if="currentRoute === '/upload'"
                            :members="members"
                            :season="currentSeason"
                            :user="currentUser"
                            @submit="handleSubmitEntry"
                        ></upload-page>
                        <vote-page
                            v-else-if="currentRoute === '/vote'"
                            :entries="entries"
                            :members="members"
                            :votes="userVotes"
                            :season="currentSeason"
                            :user="currentUser"
                            @vote="handleVote"
                        ></vote-page>
                        <leaderboard-page
                            v-else-if="currentRoute === '/leaderboard'"
                            :entries="entries"
                            :members="members"
                            :all-votes="allVotes"
                            :season="currentSeason"
                        ></leaderboard-page>
                        <history-page
                            v-else-if="currentRoute === '/history'"
                            :archives="archives"
                            :members="members"
                        ></history-page>
                        <admin-panel
                            v-else-if="currentRoute === '/admin' && currentUser.isAdmin"
                            :season="currentSeason"
                            :members="members"
                            :all-votes="allVotes"
                            :entries="entries"
                            @change-phase="handleChangePhase"
                            @archive-season="handleArchiveSeason"
                        ></admin-panel>
                        <member-detail
                            v-else-if="currentRoute.startsWith('/member/')"
                            :member-id="decodeURIComponent(currentRoute.split('/member/')[1])"
                            :members="members"
                            :entries="entries"
                            :season="currentSeason"
                            :current-user="currentUser"
                            @back="navigate('/')"
                            @avatar-uploaded="loadAllData"
                        ></member-detail>
                    </transition>
                </main>
            </div>
        </transition>
        <div v-if="notification" class="notification" :class="notification.type">
            {{ notification.message }}
        </div>
        <div v-if="loading" class="loading-overlay">
            <div class="spinner"></div>
        </div>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
